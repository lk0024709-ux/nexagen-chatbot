name: Run NexaGen AI Bot

on:
  workflow_dispatch:        # Manual trigger from GitHub UI
  schedule:
    - cron: '*/5 * * * *'  # Auto-run every 5 minutes

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - Checkout repository
      - Set up Python 3.11
      - Install dependencies
      - Run NexaGen AI Bot (with all 5 env secrets)
